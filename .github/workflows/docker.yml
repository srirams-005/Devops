name: Build Docker Image

on:
  push:
    branches: [main]

jobs:
  build-docker-image:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t my-node-app ./DockerImage

      - name: Show Docker Images
        run: docker images